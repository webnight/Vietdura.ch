<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" width="480" height="80">
  <defs>
    <linearGradient id="greenStickW" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.6)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.6)"/>
    </linearGradient>
    <linearGradient id="goldStickW" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,220,100,0.7)"/>
      <stop offset="50%" stop-color="rgba(255,220,100,1)"/>
      <stop offset="100%" stop-color="rgba(255,220,100,0.7)"/>
    </linearGradient>
  </defs>

  <!-- Chopstick LEFT (white) -->
  <g transform="rotate(-35, 40, 40)">
    <rect x="37" y="3" width="6" height="72" rx="3" fill="url(#greenStickW)" />
    <rect x="36" y="13" width="8" height="4" rx="2" fill="rgba(255,220,100,0.9)"/>
    <ellipse cx="40" cy="74" rx="2.5" ry="1.8" fill="rgba(255,255,255,0.5)"/>
  </g>

  <!-- Chopstick RIGHT (gold) -->
  <g transform="rotate(35, 40, 40)">
    <rect x="37" y="3" width="6" height="72" rx="3" fill="url(#goldStickW)" />
    <rect x="36" y="13" width="8" height="4" rx="2" fill="rgba(255,255,255,0.6)"/>
    <ellipse cx="40" cy="74" rx="2.5" ry="1.8" fill="rgba(255,220,100,0.6)"/>
  </g>

  <!-- "Restaurant" -->
  <text
    x="92" y="28"
    font-family="'Gill Sans', 'Trebuchet MS', Calibri, 'Century Gothic', sans-serif"
    font-size="14"
    font-weight="500"
    letter-spacing="4"
    fill="rgba(255,255,255,0.75)"
  >RESTAURANT</text>

  <!-- "Vietdura" -->
  <text
    x="88" y="70"
    font-family="'Gill Sans', 'Trebuchet MS', Calibri, 'Century Gothic', sans-serif"
    font-size="42"
    font-weight="500"
    fill="#ffffff"
    letter-spacing="-1"
  >Vietdura</text>

  <text x="463" y="42" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">©</text>
</svg>
