<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" width="480" height="80">
  <defs>
    <linearGradient id="greenStick" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f5c38"/>
      <stop offset="50%" stop-color="#2f7a4e"/>
      <stop offset="100%" stop-color="#1a4a2e"/>
    </linearGradient>
    <linearGradient id="goldStick" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a200"/>
      <stop offset="50%" stop-color="#f0c520"/>
      <stop offset="100%" stop-color="#b89000"/>
    </linearGradient>
  </defs>

  <!-- Chopstick LEFT (green) -->
  <g transform="rotate(-35, 40, 40)">
    <rect x="37" y="3" width="6" height="72" rx="3" fill="url(#greenStick)" />
    <rect x="36" y="13" width="8" height="4" rx="2" fill="#d4a800"/>
    <ellipse cx="40" cy="74" rx="2.5" ry="1.8" fill="#1a4a30"/>
  </g>

  <!-- Chopstick RIGHT (gold) -->
  <g transform="rotate(35, 40, 40)">
    <rect x="37" y="3" width="6" height="72" rx="3" fill="url(#goldStick)" />
    <rect x="36" y="13" width="8" height="4" rx="2" fill="#1f4d3a"/>
    <ellipse cx="40" cy="74" rx="2.5" ry="1.8" fill="#b8870a"/>
  </g>

  <!-- "Restaurant" -->
  <text
    x="92" y="28"
    font-family="'Gill Sans', 'Trebuchet MS', Calibri, 'Century Gothic', sans-serif"
    font-size="14"
    font-weight="500"
    letter-spacing="4"
    fill="#2f6b55"
  >RESTAURANT</text>

  <!-- "Vietdura" -->
  <text
    x="88" y="70"
    font-family="'Gill Sans', 'Trebuchet MS', Calibri, 'Century Gothic', sans-serif"
    font-size="42"
    font-weight="500"
    fill="#1f4d3a"
    letter-spacing="-1"
  >Vietdura</text>

  <text x="463" y="42" font-family="sans-serif" font-size="9" fill="#2f6b55" opacity="0.5">©</text>
</svg>
